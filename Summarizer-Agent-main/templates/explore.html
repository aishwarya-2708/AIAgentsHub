<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore with MCTS</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23667eea'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E📄%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="container">
        <h1> EXPLORE WITH MCTS</h1>

        <!-- Back link – centered button only -->
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="/" class="btn-back">Back to Standard</a>
        </div>

        <!-- Input Tabs (MCTS) -->
        <div class="tab-container" id="mctsTabs">
            <div class="tab-buttons">
                <button class="tab-button active" data-tab="mcts-text">TEXT</button>
                <button class="tab-button" data-tab="mcts-image">IMAGE</button>
                <button class="tab-button" data-tab="mcts-video">VIDEO</button>
            </div>
            <div class="tab-content">
                <!-- Text Tab -->
                <div id="mcts-text" class="tab-pane active">
                    <textarea id="mctsQuestion" placeholder="Enter your question or text..."></textarea>
                </div>
                <!-- Image Tab -->
                <div id="mcts-image" class="tab-pane">
                    <div class="upload-group">
                        <label for="mctsImageUpload">Upload Image(s)</label>
                        <input type="file" id="mctsImageUpload" accept="image/*" multiple>
                        <div id="mctsImagePreviews" class="preview-container"></div>
                    </div>
                </div>
                <!-- Video Tab -->
                <div id="mcts-video" class="tab-pane">
                    <div class="upload-group">
                        <label for="mctsVideoUpload">Upload Video</label>
                        <input type="file" id="mctsVideoUpload" accept="video/*">
                        <div id="mctsVideoPreview" class="preview"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MCTS Controls -->
        <div class="action-row">
            <div class="control-item">
                <label for="mctsIterations">Iterations:</label>
                <input type="range" id="mctsIterations" min="5" max="100" value="25">
                <span id="mctsIterationsValue">25</span>
            </div>
            <div class="control-item">
                <label for="mctsVariant">Variant:</label>
                <select id="mctsVariant">
                    <option value="baseline">Baseline MCTS</option>
                    <option value="reflective">R-MCTS (Reflective)</option>
                    <option value="rag">MCTS-RAG</option>
                    <option value="world">World-Guided MCTS</option>
                </select>
            </div>
            <button id="mctsRunBtn" class="btn-primary"> Run MCTS</button>
        </div>

        <!-- MCTS Results -->
        <div id="mctsResults">
            <!-- Final Answer -->
            <div id="mctsFinalResult" class="result-card" style="display: none;">
                <h3>Final Optimal Summary</h3>
                <div class="summary-box" id="mctsFinalAnswer"></div>
                <div class="agent-info" id="mctsAgentInfo"></div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>⏳ Reasoning...</p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
