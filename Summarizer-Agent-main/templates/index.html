<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarization Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23667eea'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E📄%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="container">
        <h1>TEXT SUMMARIZATION AGENT</h1>

        <!-- Navigation to MCTS page – centered button only -->
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="/explore" class="btn-mcts">EXPLORE WITH MCTS</a>
        </div>

        <!-- Input Tabs -->
        <div class="tab-container" id="standardTabs">
            <div class="tab-buttons">
                <button class="tab-button active" data-tab="standard-text"> TEXT</button>
                <button class="tab-button" data-tab="standard-image">IMAGE</button>
                <button class="tab-button" data-tab="standard-video"> VIDEO</button>
            </div>
            <div class="tab-content">
                <!-- Text Tab -->
                <div id="standard-text" class="tab-pane active">
                    <textarea id="textInput" placeholder="Enter text to summarize..."></textarea>
                </div>
                <!-- Image Tab -->
                <div id="standard-image" class="tab-pane">
                    <div class="upload-group">
                        <label for="imageUpload">Upload Image(s)</label>
                        <input type="file" id="imageUpload" accept="image/*" multiple>
                        <div id="imagePreviews" class="preview-container"></div>
                    </div>
                </div>
                <!-- Video Tab -->
                <div id="standard-video" class="tab-pane">
                    <div class="upload-group">
                        <label for="videoUpload">Upload Video</label>
                        <input type="file" id="videoUpload" accept="video/*">
                        <div id="videoPreview" class="preview"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="action-row">
            <div class="control-item">
                <label for="simulations">Simulations:</label>
                <input type="range" id="simulations" min="10" max="200" value="50">
                <span id="simulationsValue">50</span>
            </div>
            <button id="summarizeBtn" class="btn-primary">Generate Summary</button>
        </div>

        <!-- Result -->
        <div id="result" class="result-card hidden">
            <h3>🏆 Best Summary</h3>
            <div class="summary-box" id="bestSummary"></div>
            <div class="agent-info">
                Selected by: <span id="selectedAgent">-</span> |
                Confidence: <span id="confidenceScore">0</span>%
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>⏳ Processing...</p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
